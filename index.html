<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gobble Til You Wobble Countdown</title>

<style>

body{
    margin:0;
    background:transparent;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

.ticker{

    position:fixed;

    left:0;
    bottom:0;

    width:100%;
    height:180px;

    display:flex;

    align-items:center;

    background:rgba(0,0,0,.88);

    border-top:5px solid #00ff66;

    box-shadow:
    0 -5px 20px rgba(0,255,102,.6);
}

.image-area{

    width:250px;
    text-align:center;
}

.image-area img{

    height:170px;
    max-width:240px;
    object-fit:contain;
}

.info-area{

    flex:1;
}

.title{

    text-align:center;

    font-size:42px;

    font-weight:900;

    color:#ffb300;

    text-shadow:
    0 0 10px orange,
    0 0 20px orange;
}

.countdown{

    display:flex;

    justify-content:center;

    gap:25px;

    margin-top:10px;
}

.box{

    min-width:140px;

    padding:8px;

    text-align:center;

    border-radius:12px;

    background:#111;

    border:2px solid #00ff66;
}

.box span{

    display:block;

    font-size:56px;

    font-weight:bold;
}

.box small{

    color:white;

    font-size:16px;
}

#days{
    color:#ff9800;
}

#hours{
    color:#ffee00;
}

#minutes{
    color:#00ff66;
}

#seconds{
    color:#2196f3;
}

.ports{

    margin-top:10px;

    text-align:center;

    color:white;

    font-size:24px;
}

</style>
</head>

<body>

<div class="ticker">

    <div class="image-area">

        <img src="turkey.png">

    </div>

    <div class="info-area">

        <div class="title">
            🦃 GOBBLE TIL YOU WOBBLE CRUISE 🦃
        </div>

        <div class="countdown">

            <div class="box">
                <span id="days">0</span>
                <small>DAYS</small>
            </div>

            <div class="box">
                <span id="hours">0</span>
                <small>HOURS</small>
            </div>

            <div class="box">
                <span id="minutes">0</span>
                <small>MINUTES</small>
            </div>

            <div class="box">
                <span id="seconds">0</span>
                <small>SECONDS</small>
            </div>

        </div>

        <div class="ports">
            🚢 Carnival Liberty • 🌴 Celebration Key • 🌴 Half Moon Cay • 🌴 Nassau
        </div>

    </div>

</div>

<script>

const cruiseDate =
new Date("2026-11-21T11:00:00");

function updateCountdown(){

    const now = new Date();

    const diff = cruiseDate - now;

    if(diff <= 0){

        document.querySelector('.countdown').innerHTML =
        '🚢 WE ARE CRUISING!';

        return;
    }

    const days =
    Math.floor(diff/(1000*60*60*24));

    const hours =
    Math.floor((diff%(1000*60*60*24))
    /(1000*60*60));

    const minutes =
    Math.floor((diff%(1000*60*60))
    /(1000*60));

    const seconds =
    Math.floor((diff%(1000*60))/1000);

    document.getElementById('days').innerText =
    days;

    document.getElementById('hours').innerText =
    hours;

    document.getElementById('minutes').innerText =
    minutes;

    document.getElementById('seconds').innerText =
    seconds;
}

updateCountdown();

setInterval(updateCountdown,1000);

</script>

</body>
</html>
