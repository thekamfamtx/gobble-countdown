<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gobble Countdown</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:transparent;
}

/* 3X BIGGER */
#countdown-box {
  position:fixed;
  top:30px;
  right:30px;

  width:520px;
  padding:28px;

  text-align:center;
  color:white;

  background:linear-gradient(135deg,#8b0000,#ffcc00);
  border:4px solid #ffcc00;
  border-radius:20px;

  box-shadow:0 0 25px rgba(255,204,0,0.6);

  animation:pulse 1.8s infinite;
}

@keyframes pulse {
  0% { box-shadow:0 0 12px rgba(255,204,0,0.4);}
  50% { box-shadow:0 0 40px rgba(255,0,0,0.9);}
  100% { box-shadow:0 0 12px rgba(255,204,0,0.4);}
}

#title {
  font-size:26px;
  font-weight:bold;
  text-transform:uppercase;
}

#timer {
  font-size:44px;
  font-weight:bold;
  margin:12px 0;
}

#subtext {
  font-size:16px;
}

/* LOGO */
#logo {
  position:absolute;
  bottom:14px;
  right:14px;
  width:70px;
  opacity:0.35;
}
</style>
</head>

<body>

<div id="countdown-box">
  <div id="title">Gobble Til You Wobble</div>
  <div id="timer"></div>
  <div id="subtext">November 21, 2026</div>

  <img id="logo" src="kamfam-logo.png">
</div>

<script>
const target = new Date("November 21, 2026 11:00:00").getTime();

function update(){
  const now = new Date().getTime();
  const d = target - now;

  const days = Math.floor(d/(1000*60*60*24));
  const hours = Math.floor((d%(1000*60*60*24))/(1000*60*60));
  const mins = Math.floor((d%(1000*60*60))/(1000*60));
  const secs = Math.floor((d%(1000*60))/1000);

  document.getElementById("timer").innerHTML =
  `${days}d ${hours}h ${mins}m ${secs}s`;
}

update();
setInterval(update,1000);
</script>

</body>
</html>
