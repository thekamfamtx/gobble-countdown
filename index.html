<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>KAM Fam Countdown</title>

  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    /* KAM Fam branded countdown box */
    #countdown-box {
      position: fixed;
      top: 15px;
      right: 15px;

      /* KAM Fam colors: deep navy + gold accent */
      background: linear-gradient(135deg, #0b1b3a, #142a52);
      border: 2px solid #f5c542;

      color: white;
      padding: 10px 14px;
      border-radius: 14px;
      text-align: center;
      min-width: 170px;

      box-shadow: 0 0 12px rgba(245, 197, 66, 0.35);
    }

    #title {
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #f5c542;
      margin-bottom: 6px;
      font-weight: bold;
    }

    #timer {
      font-size: 16px;
      font-weight: bold;
      color: #ffffff;
    }

    #subtext {
      font-size: 10px;
      opacity: 0.8;
      margin-top: 4px;
      color: #cbd5e1;
    }
  </style>
</head>

<body>

<div id="countdown-box">
  <div id="title">KAM Fam Cruise Countdown</div>
  <div id="timer"></div>
  <div id="subtext">Gobble Til You Wobble 🚢</div>
</div>

<script>
  // Cruise date (edit if needed)
  const targetDate = new Date("November 21, 2026 00:00:00").getTime();

  function updateCountdown() {
    const now = new Date().getTime();
    const distance = targetDate - now;

    if (distance <= 0) {
      document.getElementById("timer").innerHTML = "🚢 IT'S CRUISE TIME!";
      return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((distance / (1000 * 60)) % 60);
    const seconds = Math.floor((distance / 1000) % 60);

    document.getElementById("timer").innerHTML =
      `${days}d ${hours}h ${minutes}m ${seconds}s`;
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>

</body>
</html>
